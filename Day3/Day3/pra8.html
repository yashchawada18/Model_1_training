<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Description -->
    <meta name="description" content="This is a web page description">

    <!-- Keywords for SEO -->
    <meta name="keywords" content="HTML, CSS, JavaScript, Web Development">

    <!-- Author Name -->
    <meta name="author" content="Vinod Kumar">

    <!-- Refresh Page After 5 Seconds -->
    <meta http-equiv="refresh" content="5">

    <!-- Browser Compatibility -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- Robots Instructions -->
    <meta name="robots" content="index, follow">

    <!-- Theme Color for Mobile Browser -->
    <meta name="theme-color" content="#ffffff">

    <!-- Open Graph Meta Tags (Social Media Sharing) -->
    <meta property="og:title" content="My Website">
    <meta property="og:description" content="Best website for learning web development">
    <meta property="og:image" content="image.jpg">
    <meta property="og:url" content="https://example.com">
    <meta property="og:type" content="website">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="My Website">
    <meta name="twitter:description" content="Learn HTML and CSS">
    <meta name="twitter:image" content="image.jpg">

    <!-- Content Type -->
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <!-- No Cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <!-- Expire Cache -->
    <meta http-equiv="Expires" content="0">

    <!-- Language -->
    <meta http-equiv="Content-Language" content="en">

    <title>Document</title>

</head>
<body>
    
</body>
</html>
