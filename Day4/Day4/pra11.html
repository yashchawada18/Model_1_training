<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.game-box{
    width:100%;
    max-width:420px;
    text-align:center;
    background:rgba(255,255,255,.15);
    border-radius:20px;
    padding:25px;
}

h1,.status{
    color:white;
    margin-bottom:20px;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.cell{
    aspect-ratio:1;
    background:white;
    border-radius:15px;
}

.cell input[type="text"]{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    text-align:center;
    font-size:55px;
    font-weight:bold;
    border-radius:15px;
    text-transform:uppercase;
}

.result-box{
    margin-top:20px;
    color:white;
}

.result-box label{
    margin:0 8px;
    cursor:pointer;
}

.result{
    margin-top:15px;
    font-size:22px;
    font-weight:bold;
    display:none;
}

#winx:checked ~ .x-win{
    display:block;
}

#wino:checked ~ .o-win{
    display:block;
}

#draw:checked ~ .draw-game{
    display:block;
}

button{
    margin-top:20px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="game-box">

    <h1>Tic Tac Toe</h1>

    <div class="status">
        Enter X or O
    </div>

    <div class="board">

        <div class="cell"><input type="text" maxlength="1"></div>
        <div class="cell"><input type="text" maxlength="1"></div>
        <div class="cell"><input type="text" maxlength="1"></div>

        <div class="cell"><input type="text" maxlength="1"></div>
        <div class="cell"><input type="text" maxlength="1"></div>
        <div class="cell"><input type="text" maxlength="1"></div>

        <div class="cell"><input type="text" maxlength="1"></div>
        <div class="cell"><input type="text" maxlength="1"></div>
        <div class="cell"><input type="text" maxlength="1"></div>

    </div>


    <div class="result-box">

        <input type="radio" name="result" id="winx">X Win

        <input type="radio" name="result" id="wino">O Win

        <input type="radio" name="result" id="draw">Draw

        <div class="result x-win">🎉 Player X Wins</div>
        <div class="result o-win">🎉 Player O Wins</div>
        <div class="result draw-game">🤝 Game Draw</div>

    </div>

    <button>Restart</button>

</div>

</body>
</html>
