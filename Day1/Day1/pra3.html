<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PRACTICAL 3 OJT</title>
  </head>
  <body>
    <h1>Student Registration</h1>
    <form action="">
      Name: <input type="text" name="name" />
      <br><br>

       Enrollment No.<input type="text" name="eno" maxlength="12"/>
       <br><br>

      Branch: <select name="branch" id="branch">
        <option value="cs">CS</option>
        <option value="cse">CSE</option>
      </select>
      <br><br>

      Gender: <input type="radio" name="gender" value="male" />Male
      <input type="radio" name="gender" value="female" />Female
      <br><br>

      Mobile No. <input type="tel" name="mno">
      <br><br>

      Email: <input type="email" name="email">
        <br><br>

    Password: <input type="password" name="password">
      <br><br>

      Photo: <input type="file" name="photo" accept="image/*">
      <br><br>  

      Remember Me: <input type="checkbox" name="remember" value="yes">
      <br><br>  

      <input type="submit" value="Submit" />
        <input type="reset" value="Reset" />
    </form>
  </body>
</html>
